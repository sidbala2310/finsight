name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGION: us-central1
  SERVICE: finsight
  IMAGE: us-central1-docker.pkg.dev/finsight-sb-app/finsight/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1024301206514/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-deployer@finsight-sb-app.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push --all-tags "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:${{ github.sha }}" \
            --region "$REGION" \
            --service-account finsight-runtime@finsight-sb-app.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 2 \
            --memory 512Mi --cpu 1 \
            --set-env-vars "APP_ENV=production" \
            --set-secrets "DATABASE_URL=database-url:latest,REDIS_URL=redis-url:latest"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region "$REGION" --format 'value(status.url)')
          echo "Service URL: $URL"
          curl --fail --silent --show-error "$URL/readyz"
          echo
          curl --fail --silent --show-error "$URL/version"
